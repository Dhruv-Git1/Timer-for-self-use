name: timetracker_android_widget
description: Android home-screen widget, alarms and notification bridge for Time Tracker.
version: 0.2.0
homepage: https://example.invalid/timetracker

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flet: ^0.86.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.timetracker.widget
        pluginClass: TimetrackerAndroidWidgetPlugin
